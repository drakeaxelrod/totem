# Left half as central (no dongle) — BLE output to host
CONFIG_ZMK_BLE=y
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Single host — stop advertising once connected
# Profile count = BT_MAX_PAIRED - CENTRAL_PERIPHERALS = 2 - 1 = 1

# Sleep settings (battery powered)
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
CONFIG_ZMK_IDLE_TIMEOUT=30000

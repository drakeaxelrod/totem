# Dongle is always-on (USB or battery powered) — never idle or sleep
CONFIG_ZMK_IDLE_TIMEOUT=86400000
CONFIG_ZMK_SLEEP=n

# Enable BLE output to host (not just split communication)
CONFIG_ZMK_BLE=y

# Max TX power for reliable BLE to both peripherals + host
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# Disable 2M PHY for stability (matches halves, improves host compatibility)
CONFIG_ZMK_BLE_EXPERIMENTAL_CONN=y

# ZMK Studio over USB
CONFIG_ZMK_STUDIO=y
